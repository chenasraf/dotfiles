        opts:
          repository: junegunn/fzf
          strategy: tar
          destination: ~/.local/bin
          download_filename: fzf-{{ .Version }}-linux_{{ .Arch }}.tar.gz

  - name: fd
    type: group
    steps:
      - name: fd
        type: brew
      - name: fd-find
        bin_name: fd
        type: apt
        platforms:
          only: ["linux"]

  - name: aerospace
    type: group
    platforms: { only: ["macos"] }
    steps:
      - name: borders
        type: brew
        skip_summary:
          install: true
        opts:
          tap: FelixKratz/formulae
      - name: aerospace
        type: brew
        post_update: aerospace reload-config
        opts:
          tap: nikitabobko/tap
          cask: true
      - name: aerospace-config
        type: shell
        tags: aerospace-config config aerospace
        check_installed: test -f $(which aerospace)
        skip_summary:
          update: true
        opts:
          command: exit 1
          update_command: aerospace reload-config

  - name: catimg
    type: group
    steps:
      - name: catimg
        type: brew
      - name: catimg
        type: apt
        platforms:
          only: ["linux"]

  - name: bat
    type: group
    steps:
      - name: bat
        type: brew
      - name: bat
        type: apt
        platforms:
          only: ["linux"]

  - name: pandoc
    type: group
    steps:
      - name: pandoc
        type: brew
      - name: pandoc
        # type: github-release
        # platforms:
        #   only: ['linux']
        # opts:
        #   repository: jgm/pandoc
        #   destination: ~/.local/bin
        #   download_filename: pandoc-{{ .Tag }}-linux-{{ .Arch }}
        type: shell
        platforms:
          only: ["linux"]
        opts:
          command: |
            cd $(mktemp -d)
            VERSION=$(curl -s "https://api.github.com/repos/jgm/pandoc/tags" | jq -r ".[] | select(.name | contains('cli')) | .name" | head -n 1)
            curl -Lo pandoc.deb "https://github.com/jgm/pandoc/releases/download/$VERSION/pandoc-${VERSION}-1-amd64.deb"
            dpkg -i pandoc.deb
            rm -rf pandoc.deb

  - name: nextcloud-talk
    type: brew
    check_installed: test -d "/Applications/Nextcloud Talk.app"

  - name: aseprite
    type: group
    enabled: false
    steps:
      - name: cmake
        type: brew
      - name: ninja
        type: brew
      - name: aseprite/aseprite
        type: git
        post_install: |
          cd ~/.local/build/aseprite
          rm -f build/CMakeCache.txt
          ./build.sh --auto --norun
          cp bin/aseprite /Applications/Aseprite.app/Contents/MacOS/aseprite

          RAW_TAG=$(git describe --tags --abbrev=0)
          VERSION=${RAW_TAG#v}
          PLIST="/Applications/Aseprite.app/Contents/Info.plist"
          plutil -convert xml1 "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
        post_update: |
          cd ~/.local/build/aseprite
          rm -f build/CMakeCache.txt
          ./build.sh --auto --norun
          cp bin/aseprite /Applications/Aseprite.app/Contents/MacOS/aseprite

          RAW_TAG=$(git describe --tags --abbrev=0)
          VERSION=${RAW_TAG#v}
          PLIST="/Applications/Aseprite.app/Contents/Info.plist"
          plutil -convert xml1 "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
        opts:
          destination: ~/.local/build
          flags: --depth=1

  - name: regex-tui
    type: github-release
    opts:
      repository: vitor-mariano/regex-tui
      strategy: none
      destination: ~/.local/bin
      download_filename:
        macos: regex-tui_{{ .Tag }}_darwin.{{ .Arch }}
        linux: regex-tui_{{ .Tag }}_linux.{{ .Arch }}
        windows: regex-tui_{{ .Tag }}_windows.{{ .Arch }}.exe

  - name: fastlane
    type: brew
    machines:
      only: ["m1"]

  # ----------------------------------------------------------------------
  # 💻 Language Runtimes & Package Managers
  # ----------------------------------------------------------------------
  # Installers for language version managers like pyenv, fnm, etc.

  # - category: 💻 Language Runtimes & Package Managers
  #   desc: Installers for language version managers like pyenv, fnm, etc.

  - name: fnm
    type: shell
    post_install: |
      FNM_PATH="/root/.local/share/fnm"
      if [ -d "$FNM_PATH" ]; then
        export PATH="$FNM_PATH:$PATH"
        eval "`fnm env`"
      fi
      fnm install --lts
      fnm use lts-latest
    opts:
      command: curl -fsSL https://fnm.vercel.app/install | bash

  - name: pyenv
    type: group
    steps:
      - name: pyenv
        type: brew
      - name: pyenv
        type: shell
        platforms:
          only: ["linux"]
        opts:
          command: "curl https://pyenv.run | bash"

