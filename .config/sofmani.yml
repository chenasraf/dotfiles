# yaml-language-server: $schema=https://raw.githubusercontent.com/chenasraf/sofmani/master/schema/sofmani.schema.json

# debug: true
check_updates: true
defaults:
  type:
    brew:
      platforms:
        only: ["macos"]
    github-release:
      opts:
        github_token: $GITHUB_TOKEN
    rsync:
      verbose: true

machine_aliases:
  m1: 5fa2a8e8193868df
  spider: d0de2a71060c023e
  planck: 0f5d6c09c377537f

install:
  # ----------------------------------------------------------------------
  # 🧰 Configs & Dotfiles
  # ----------------------------------------------------------------------
  # Installers that sync dotfiles or apply local system configurations.

  # - category: 🧰 Configs & Dotfiles
  #   desc: Installers that sync dotfiles or apply local system configurations.

  - name: tmux-config
    type: shell
    tags: config tmux
    skip_summary: true
    platforms:
      only: ["macos"]
    opts:
      command: |
        if ! tmux source-file "$HOME/.config/tmux/conf.tmux"; then
          echo "⚠️  Failed to source tmux config"
        fi

  - name: tx-config
    type: shell
    tags: config tmux
    enabled: test -f "$HOME/.config/tmux_{{ .DeviceIDAlias }}.yml"
    check_installed: test -f ~/.config/tmux_local.yml
    check_has_update: '! diff -q "$HOME/.config/tmux_{{ .DeviceIDAlias }}.yml" ~/.config/tmux_local.yml > /dev/null 2>&1'
    opts:
      command: cp "$HOME/.config/tmux_{{ .DeviceIDAlias }}.yml" ~/.config/tmux_local.yml
      update_command: cp "$HOME/.config/tmux_{{ .DeviceIDAlias }}.yml" ~/.config/tmux_local.yml

  - name: osx-defaults
    type: shell
    tags: system
    skip_summary: true
    check_installed: test $(defaults read -g PMPrintingExpandedStateForPrint) -eq 1
    check_has_update: test $(defaults read -g PMPrintingExpandedStateForPrint) -eq 1
    platforms:
      only: ["macos"]
    opts:
      command: |
        defaults write -g PMPrintingExpandedStateForPrint -bool TRUE
        defaults write -g NSScrollViewRubberbanding -bool FALSE
        defaults write cc.ffitch.shottr growingToolbar 1

  # ----------------------------------------------------------------------
  # 🧾 Git Setup
  # ----------------------------------------------------------------------
  # Installers for git config, GPG setup, aliases, delta integration, etc.

  # - category: 🧾 Git Setup
  #   desc: Installers for git config, GPG setup, aliases, delta integration, etc.

  - name: git-gpg
    type: shell
    tags: git
    check_installed: 'gpg --list-keys | grep -q "$GITHUB_GPG_KEY_ID"'
    opts:
      command: curl https://github.com/web-flow.gpg | gpg --import

  - name: chenasraf/git-open
    type: git
    tags: plugin
    opts:
      ref: master
      destination: ~/.local/share/zsh/plugins

  - name: stow
    type: group
    steps:
      - name: stow
        type: brew
      - name: stow
        type: apt
        platforms:
          only: ["linux"]

  - name: gh
    type: group
    machines:
      except: ["planck"]
    steps:
      - name: gh
        type: brew
      - name: gh
        type: apt
        platforms:
          only: ["linux"]

  - name: glab
    type: brew
    machines:
      only: ["planck"]

  - name: git-config
    type: shell
    tags: git
    check_installed: (git config --global user.name && git config --global user.email && git config --global user.signingkey) > /dev/null 2>&1
    opts:
      command: |
        git config --global user.signingkey "~/.ssh/id_casraf.pub"
        git config --global filter.lfs.clean "git-lfs clean -- %f"
        git config --global filter.lfs.smudge "git-lfs smudge -- %f"
        git config --global filter.lfs.process "git-lfs filter-process"
        git config --global filter.lfs.required true
        git config --global init.defaultBranch "master"
        git config --global credential.helper "store"
        git config --global pull.rebase true
        git config --global core.excludesfile "~/.config/.gitignore"
        # git config --global core.untrackedCache true
        # git config --global core.fsmonitor true
        git config --global rerere.enabled true
        git config --global gpg.format "ssh"
        git config --global gpg.ssh.allowedSignersFile "~/.ssh/allowed_signers"
        git config --global commit.gpgsign true
        git config --global maintenance.repo "$HOME/.dotfiles.git"
        git config --global fetch.writeCommitGraph true
        git config --global log.showSignature true
        git config --global core.excludesfile ~/.config/.gitignore

        # ================================================================================================
        # Aliases/Custom commands
        # ================================================================================================

        # Change status
        git config --global alias.unchanged "update-index --assume-unchanged"
        git config --global alias.changed "update-index --no-assume-unchanged"
        git config --global alias.show-unchanged "!git ls-files -v | sed -e 's/^[a-z] //p; d'"
        git config --global alias.list-aliases "!git config --global --list | grep --color alias\. | grep -v list-aliases | sed \"s/alias\./\$(tput setaf 1)/\" | sed \"s/=/\$(tput sgr0)=/\""

        # Delta Pager
        git config --global core.pager delta
        git config --global interactive.diffFilter "delta --color-only"
        # git config --global delta.side-by-side true
        # git config --global delta.navigate true
        # git config --global delta.dark true
        git config --global merge.conflictStyle diff3
        git config --global delta.line-numbers true
        git config --global diff.colorMoved default

