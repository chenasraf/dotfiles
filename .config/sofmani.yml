  - name: gi_gen
    type: group
    steps:
      - name: gi_gen
        type: brew
        opts:
          tap: chenasraf/tap
      - name: gi_gen
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: chenasraf/gi_gen
