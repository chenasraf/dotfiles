      - name: yq
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: mikefarah/yq
          destination: ~/.local/bin
          download_filename: yq_linux_{{ .Arch }}

  - name: direnv
    type: group
    steps:
      - name: direnv
        type: brew
      - name: direnv
        type: shell
        platforms:
          only: ["linux"]
        opts:
          command: export bin_path=/usr/local/bin curl -sfL https://direnv.net/install.sh | bash

  - name: dotenvx
    type: group
    steps:
      - name: dotenvx
        type: brew
        opts:
          tap: dotenvx/brew
      - name: dotenvx
        type: shell
