# yaml-language-server: $schema=https://raw.githubusercontent.com/chenasraf/sofmani/master/schema/sofmani.schema.json

# debug: true
check_updates: true
defaults:
  type:
    github-release:
      opts:
        github_token: $GITHUB_TOKEN
    rsync:
      verbose: true

machine_aliases:
  m1: 5fa2a8e8193868df
  spider: d0de2a71060c023e
  planck: 0f5d6c09c377537f

install:
  # ----------------------------------------------------------------------
  # 🧰 Configs & Dotfiles
  # ----------------------------------------------------------------------
  # Installers that sync dotfiles or apply local system configurations.

  # - category: 🧰 Configs & Dotfiles
  #   desc: Installers that sync dotfiles or apply local system configurations.

  - name: tx-config
    type: shell
    tags: config tmux
    enabled: test -f "$DOTFILES/.config/tmux_{{ .DeviceIDAlias }}.yml"
    check_installed: test -e ~/.config/tmux_local.yml && [ "$(readlink "$DOTFILES/.config/tmux_local.yml")" = "tmux_{{ .DeviceIDAlias }}.yml" ]
    check_has_update: '[ "$(readlink "$DOTFILES/.config/tmux_local.yml" 2>/dev/null)" != "tmux_{{ .DeviceIDAlias }}.yml" ]'
    opts:
      command: ln -sfn "tmux_{{ .DeviceIDAlias }}.yml" "$DOTFILES/.config/tmux_local.yml" && stow -R -d "$DOTFILES" -t ~ .
      update_command: ln -sfn "tmux_{{ .DeviceIDAlias }}.yml" "$DOTFILES/.config/tmux_local.yml" && stow -R -d "$DOTFILES" -t ~ .

  - name: osx-defaults
    type: shell
    tags: system
    skip_summary: true
    check_installed: test $(defaults read -g PMPrintingExpandedStateForPrint) -eq 1
    check_has_update: test $(defaults read -g PMPrintingExpandedStateForPrint) -eq 1
    platforms:
      only: ["macos"]
    opts:
      command: |
        defaults write -g PMPrintingExpandedStateForPrint -bool TRUE
        defaults write -g NSScrollViewRubberbanding -bool FALSE
        defaults write cc.ffitch.shottr growingToolbar 1

  # ----------------------------------------------------------------------
  # 🧾 Git Setup
  # ----------------------------------------------------------------------
  # Installers for git config, GPG setup, aliases, delta integration, etc.

  # - category: 🧾 Git Setup
  #   desc: Installers for git config, GPG setup, aliases, delta integration, etc.

  - name: git-gpg
    type: shell
    tags: git
    check_installed: 'gpg --list-keys | grep -q "$GITHUB_GPG_KEY_ID"'
    opts:
      command: curl https://github.com/web-flow.gpg | gpg --import

  - name: chenasraf/git-open
    type: git
    tags: plugin
    opts:
      ref: master
      destination: ~/.local/share/zsh/plugins

  - name: stow
    type: brew

  - name: gh
    type: brew
    machines:
      except: ["planck"]

  - name: glab
    type: brew

  - name: git-config
    type: shell
    tags: git
    check_installed: (git config --global user.name && git config --global user.email && git config --global user.signingkey) > /dev/null 2>&1
    opts:
      command: |
        git config --global user.signingkey "~/.ssh/id_casraf.pub"
        git config --global filter.lfs.clean "git-lfs clean -- %f"
        git config --global filter.lfs.smudge "git-lfs smudge -- %f"
        git config --global filter.lfs.process "git-lfs filter-process"
        git config --global filter.lfs.required true
        git config --global init.defaultBranch "master"
        git config --global credential.helper "store"
        git config --global pull.rebase true
        git config --global core.excludesfile "~/.config/.gitignore"
        # git config --global core.untrackedCache true
        # git config --global core.fsmonitor true
        git config --global rerere.enabled true
        git config --global gpg.format "ssh"
        git config --global gpg.ssh.allowedSignersFile "~/.ssh/allowed_signers"
        git config --global commit.gpgsign true
        git config --global maintenance.repo "$HOME/.dotfiles.git"
        git config --global fetch.writeCommitGraph true
        git config --global log.showSignature true
        git config --global core.excludesfile ~/.config/.gitignore

        # ================================================================================================
        # Aliases/Custom commands
        # ================================================================================================

        # Change status
        git config --global alias.unchanged "update-index --assume-unchanged"
        git config --global alias.changed "update-index --no-assume-unchanged"
        git config --global alias.show-unchanged "!git ls-files -v | sed -e 's/^[a-z] //p; d'"
        git config --global alias.list-aliases "!git config --global --list | grep --color alias\. | grep -v list-aliases | sed \"s/alias\./\$(tput setaf 1)/\" | sed \"s/=/\$(tput sgr0)=/\""

        # Delta Pager
        git config --global core.pager delta
        git config --global interactive.diffFilter "delta --color-only"
        # git config --global delta.side-by-side true
        # git config --global delta.navigate true
        # git config --global delta.dark true
        git config --global merge.conflictStyle diff3
        git config --global delta.line-numbers true
        git config --global diff.colorMoved default

  # ----------------------------------------------------------------------
  # 🍺 Custom Homebrew Taps
  # ----------------------------------------------------------------------
  # Taps that provide custom tools or host additional formulas.

  # - category: 🍺 Custom Homebrew Taps
  #   desc: Taps that provide custom tools or host additional formulas.

  - name: sofmani
    type: brew
    opts:
      tap: chenasraf/tap

  - name: vstask
    type: brew
    opts:
      tap: chenasraf/tap

  - name: watchr
    type: brew
    opts:
      tap: chenasraf/tap

  - name: treelike
    type: brew
    opts:
      tap: chenasraf/tap

  - name: gi_gen
    type: brew
    opts:
      tap: chenasraf/tap

  - name: tx
    type: brew
    opts:
      tap: chenasraf/tap

  - name: wand
    type: brew
    opts:
      tap: chenasraf/tap

  - name: cospend-cli
    bin_name: cospend
    type: brew
    opts:
      tap: chenasraf/tap

  - name: direnv-dotenvx
    check_installed: test -f ~/.config/direnv/lib/use_dotenvx.sh
    type: brew
    post_install: test -f  ~/.config/direnv/lib/use_dotenvx.sh || ln -s $(brew --prefix)/opt/direnv-dotenvx/libexec/use_dotenvx.sh ~/.config/direnv/lib/use_dotenvx.sh
    post_update: test -f  ~/.config/direnv/lib/use_dotenvx.sh || ln -s $(brew --prefix)/opt/direnv-dotenvx/libexec/use_dotenvx.sh ~/.config/direnv/lib/use_dotenvx.sh
    opts:
      tap: chenasraf/tap

  # ----------------------------------------------------------------------
  # 🛠️ Dev Tools & Utilities
  # ----------------------------------------------------------------------
  # CLI utilities and general tools for development workflows.

  # - category: 🛠️ Dev Tools & Utilities
  #   desc: CLI utilities and general tools for development workflows.

  - name: neovim
    bin_name: nvim
    type: brew

  - name: tree-sitter
    type: github-release
    opts:
      repository: tree-sitter/tree-sitter
      destination: ~/.local/bin
      strategy: gz
      # tree-sitter release arch naming: arm64 | x64 (not amd64/x86_64)
      download_filename: tree-sitter-{{ .OS }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}.gz

  - name: lazygit
    type: brew

  - name: lazydocker
    type: brew
    opts:
      tap: jesseduffield/lazydocker

  - name: lazysql
    type: brew
    opts:
      tap: jorgerojas26/lazysql

  - name: lazyssh
    type: brew
    opts:
      tap: Adembc/tap

  - name: devtui
    type: github-release
    opts:
      repository: skatkov/devtui
      strategy: tar
      destination: ~/.local/bin
      download_filename:
        macos: devtui_Darwin_{{ .ArchAlias }}.tar.gz
        linux: devtui_Linux_{{ .ArchAlias }}.tar.gz

  - name: atuin
    type: shell
    check_has_update: '[ "$(cat ~/.cache/sofmani/atuin-version.txt 2>/dev/null)" != "$(curl -fsSL https://api.github.com/repos/atuinsh/atuin/releases/latest | jq -r .tag_name)" ]'
    post_install: mkdir -p ~/.cache/sofmani && curl -fsSL https://api.github.com/repos/atuinsh/atuin/releases/latest | jq -r .tag_name > ~/.cache/sofmani/atuin-version.txt
    post_update: mkdir -p ~/.cache/sofmani && curl -fsSL https://api.github.com/repos/atuinsh/atuin/releases/latest | jq -r .tag_name > ~/.cache/sofmani/atuin-version.txt
    opts:
      command: curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh
      update_command: atuin-update

  - name: git-delta
    type: brew
    bin_name: delta

  - name: jq
    type: brew

  - name: yq
    type: brew

  - name: direnv
    type: brew

  - name: dotenvx
    type: brew
    opts:
      tap: dotenvx/brew

  - name: ffmpeg
    type: brew

  - name: fzf
    type: brew

  - name: fd
    type: brew

  - name: superfile
    type: brew
    bin_name: spf

  - name: zoxide
    type: brew
    bin_name: z

  - name: aerospace
    type: group
    platforms: { only: ["macos"] }
    steps:
      - name: borders
        type: brew
        skip_summary:
          install: true
        opts:
          tap: FelixKratz/formulae
      - name: aerospace
        type: brew
        post_update: aerospace reload-config
        opts:
          tap: nikitabobko/tap
          cask: true
      - name: aerospace-config
        type: shell
        tags: aerospace-config config aerospace
        check_installed: test -f $(which aerospace)
        skip_summary:
          update: true
        opts:
          command: exit 1
          update_command: aerospace reload-config

  - name: autoraise
    type: brew
    platforms:
      only: ["macos"]
    post_install: brew services start autoraise
    post_update: brew services restart autoraise
    opts:
      tap: dimentium/autoraise

  - name: catimg
    type: brew

  - name: btop
    type: brew

  - name: bat
    type: brew

  - name: eza
    type: brew

  - name: pandoc
    type: brew

  - name: nextcloud-talk
    type: brew
    platforms:
      only: ["macos"]
    check_installed: test -d "/Applications/Nextcloud Talk.app"

  - name: aseprite
    type: group
    platforms:
      only: ["macos"]
    steps:
      - name: cmake
        type: brew
      - name: ninja
        type: brew
      - name: aseprite/aseprite
        type: git
        check_has_update: '[ "$(git -C ~/.local/build/aseprite rev-parse HEAD 2>/dev/null)" != "$(git ls-remote https://github.com/aseprite/aseprite refs/heads/main | cut -f1)" ]'
        pre_update: |
          cd ~/.local/build/aseprite
          git fetch --depth=1 origin main
          git reset --hard FETCH_HEAD
          git submodule update --init --recursive --depth=1 -f
        post_install: |
          cd ~/.local/build/aseprite
          git submodule update --init --recursive --depth=1
          rm -f build/CMakeCache.txt
          ./build.sh --auto --norun
          chmod +x build/bin/aseprite
          cp -f build/bin/aseprite /Applications/Aseprite.app/Contents/MacOS/aseprite
          rsync -a --delete build/bin/data/ /Applications/Aseprite.app/Contents/Resources/data/
          xattr -rd com.apple.quarantine /Applications/Aseprite.app

          RAW_TAG=$(gh api repos/aseprite/aseprite/releases/latest --jq .tag_name)
          VERSION=${RAW_TAG#v}
          PLIST="/Applications/Aseprite.app/Contents/Info.plist"
          plutil -convert xml1 "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
        post_update: |
          cd ~/.local/build/aseprite
          rm -f build/CMakeCache.txt
          ./build.sh --auto --norun
          chmod +x build/bin/aseprite
          cp -f build/bin/aseprite /Applications/Aseprite.app/Contents/MacOS/aseprite
          rsync -a --delete build/bin/data/ /Applications/Aseprite.app/Contents/Resources/data/
          xattr -rd com.apple.quarantine /Applications/Aseprite.app

          RAW_TAG=$(gh api repos/aseprite/aseprite/releases/latest --jq .tag_name)
          VERSION=${RAW_TAG#v}
          PLIST="/Applications/Aseprite.app/Contents/Info.plist"
          plutil -convert xml1 "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
        opts:
          destination: ~/.local/build
          install_flags: --depth=1 --recurse-submodules --shallow-submodules

  - name: regex-tui
    type: github-release
    opts:
      repository: vitor-mariano/regex-tui
      strategy: none
      destination: ~/.local/bin
      download_filename:
        macos: regex-tui_{{ .Tag }}_darwin.{{ .Arch }}
        linux: regex-tui_{{ .Tag }}_linux.{{ .Arch }}
        windows: regex-tui_{{ .Tag }}_windows.{{ .Arch }}.exe

  - name: fastlane
    type: brew
    machines:
      only: ["m1"]

  - name: lefthook
    type: brew

  - name: lintree
    type: github-release
    opts:
      repository: PatchMon/lintree
      destination: ~/.local/bin
      strategy: tar
      archive_bin_name:
        macos: lintree-darwin-{{ .ArchAlias }}
        linux: lintree-linux-{{ .Arch }}
      download_filename:
        macos: lintree-darwin-{{ .ArchAlias }}.tar.gz
        linux: lintree-linux-{{ .Arch }}.tar.gz

  - name: tmux
    type: brew

  - name: jless
    type: brew

  - name: dysk
    type: brew

  # ----------------------------------------------------------------------
  # 💻 Language Runtimes & Package Managers
  # ----------------------------------------------------------------------
  # Installers for language version managers like pyenv, fnm, etc.

  # - category: 💻 Language Runtimes & Package Managers
  #   desc: Installers for language version managers like pyenv, fnm, etc.

  - name: fnm
    type: brew

  - name: pyenv
    type: brew

  - name: uv
    type: brew

  # ----------------------------------------------------------------------
  # 📦 PNPM Ecosystem
  # ----------------------------------------------------------------------
  # Global CLI tools and utilities installed via pnpm.

  # - category: 📦 PNPM Ecosystem
  #   desc: Global CLI tools and utilities installed via pnpm.

  - name: pnpm
    type: shell
    opts:
      command: npm i -g pnpm
      update_command: pnpm self-update

  - name: typescript
    bin_name: tsc
    type: pnpm

  - name: tldr
    type: pnpm

  - name: simple-scaffold
    type: pnpm

  - name: firebase-tools
    bin_name: firebase
    type: pnpm

  - name: prettier
    type: pnpm

  - name: http-server
    type: pnpm

  - name: licenseg
    type: pnpm

  - name: vscode-langservers-extracted
    bin_name: vscode-json-language-server
    type: pnpm

  # ----------------------------------------------------------------------
  # 🤖 AI
  # ----------------------------------------------------------------------
  # AI-related apps/tools

  # - category: 🤖 AI
  #   desc: AI-related apps/tools

  - name: claude-code
    bin_name: claude
    type: brew
    post_install: "[[ $(uname -s) != 'Darwin' ]] || xattr -rd com.apple.quarantine $(which claude)"
    post_update: "[[ $(uname -s) != 'Darwin' ]] || xattr -rd com.apple.quarantine $(which claude)"
    opts:
      cask: true

  - name: opencode
    type: brew
    enabled: false

  - name: "@google/gemini-cli"
    bin_name: gemini
    type: pnpm
    enabled: false

  - name: "@openai/codex"
    bin_name: codex
    type: pnpm
    enabled: false

  - name: ollama
    type: group
    enabled: false
    steps:
      - name: ollama
        type: group
        steps:
          - name: ollama
            type: brew
            post_install: brew services start ollama
            post_update: brew services restart ollama
          - name: ollama
            type: shell
            check_installed: ollama --version
            check_has_update: true
            opts:
              command: curl -fsSL https://ollama.com/install.sh | sh
              update_command: curl -fsSL https://ollama.com/install.sh | sh

      - name: ghcr.io/open-webui/open-webui:main
        bin_name: open-webui
        tags: openwebui
        type: docker
        opts:
          skip_if_unavailable: true
          flags: >
            -d
            -p 3300:8080
            --add-host=host.docker.internal:host-gateway
            -v open-webui:/app/backend/data

  # ----------------------------------------------------------------------
  # 🐍 Python Tools (via pipx)
  # ----------------------------------------------------------------------
  # Python tools and utilities installed via pipx.

  # - category: 🐍 Python Tools (via pipx)
  #   desc: Python tools and utilities installed via pipx.

  - name: pipx
    type: brew
    post_install: sudo pipx ensurepath --global

  - name: jedi-language-server
    type: pipx

  - name: black
    type: pipx

  # ----------------------------------------------------------------------
  # 🔌 Zsh & Tmux Plugins
  # ----------------------------------------------------------------------
  # Git-based plugins and themes for Zsh shell and Tmux.

  # - category: 🔌 Zsh & Tmux Plugins
  #   desc: Git-based plugins and themes for Zsh shell and Tmux.

  # local-plugins: no longer needed — tracked in-place by bare repo at ~/.local/share/zsh/plugins/local/

  - name: romkatv/powerlevel10k
    type: git
    tags: plugin zsh
    opts:
      ref: master
      destination: ~/.local/share/zsh/plugins

  - name: zsh-users/zsh-autosuggestions
    type: git
    tags: plugin zsh
    opts:
      destination: ~/.local/share/zsh/plugins

  - name: Aloxaf/fzf-tab
    type: git
    tags: plugin zsh
    opts:
      destination: ~/.local/share/zsh/plugins

  - name: tpack
    type: brew
    opts:
      tap: tmuxpack/tpack

  # ----------------------------------------------------------------------
  # 🧭 Desktop Productivity Tools
  # ----------------------------------------------------------------------
  # Custom tools and GitHub binaries not installed via a package manager.

  # - category: 🧭 Desktop Productivity Tools
  #   desc: Custom tools and GitHub binaries not installed via a package manager.

  - name: wezterm
    type: brew
    enabled: false

  - name: alacritty
    type: brew
    enabled: false

  - name: ghostty
    type: brew
    opts:
      cask: true

  # ----------------------------------------------------------------------
  # 🆎 Fonts
  # ----------------------------------------------------------------------

  # - category: 🆎 Fonts

  - name: font-meslo-lg-nerd-font
    check_installed: fc-list | grep -q "Meslo"
    type: brew
    tags: font
    platforms: { only: ["macos"] }
    frequency: 26w

  - name: font-fira-code-nerd-font
    check_installed: fc-list | grep -q "Fira"
    type: brew
    tags: font
    platforms: { only: ["macos"] }
    frequency: 26w
