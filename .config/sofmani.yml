  # - category: 📦 PNPM Ecosystem
  #   desc: Global CLI tools and utilities installed via pnpm.

  - name: pnpm
    type: shell
    opts:
      command: npm i -g pnpm
      update_command: pnpm self-update

  - name: typescript
    bin_name: tsc
    type: pnpm

  - name: tldr
    type: pnpm

  - name: simple-scaffold
    type: pnpm

  - name: firebase-tools
    bin_name: firebase
    type: pnpm

  - name: prettier
    type: pnpm

  - name: http-server
    type: pnpm

  - name: licenseg
    type: pnpm

  - name: vscode-langservers-extracted
    bin_name: vscode-json-language-server
    type: pnpm

  # ----------------------------------------------------------------------
  # 🤖 AI
  # ----------------------------------------------------------------------
  # AI-related apps/tools

  # - category: 🤖 AI
  #   desc: AI-related apps/tools

  - name: claude-code
    bin_name: claude
    type: brew
    post_install: xattr -rd com.apple.quarantine $(which claude)
    post_update: xattr -rd com.apple.quarantine $(which claude)
    opts:
      cask: true

  - name: opencode
    type: brew
    enabled: false

  - name: "@google/gemini-cli"
    bin_name: gemini
    type: pnpm
    enabled: false

  - name: "@openai/codex"
    bin_name: codex
    type: pnpm
    enabled: false

  - name: ollama
    type: group
    enabled: false
    steps:
      - name: ollama
        type: group
        steps:
          - name: ollama
            type: brew
            post_install: brew services start ollama
            post_update: brew services restart ollama
          - name: ollama
            type: shell
            check_installed: ollama --version
            check_has_update: true
            opts:
              command: curl -fsSL https://ollama.com/install.sh | sh
              update_command: curl -fsSL https://ollama.com/install.sh | sh

      - name: ghcr.io/open-webui/open-webui:main
        bin_name: open-webui
        tags: openwebui
        type: docker
        opts:
          skip_if_unavailable: true
          flags: >
            -d
            -p 3300:8080
            --add-host=host.docker.internal:host-gateway
            -v open-webui:/app/backend/data

  # ----------------------------------------------------------------------
  # 🐍 Python Tools (via pipx)
  # ----------------------------------------------------------------------
  # Python tools and utilities installed via pipx.

  # - category: 🐍 Python Tools (via pipx)
  #   desc: Python tools and utilities installed via pipx.

  - name: pipx
    type: group
    post_install: sudo pipx ensurepath --global
    steps:
      - name: pipx
        type: brew

      - name: pipx
        type: apt
        platforms:
          only: ["linux"]

      - name: jedi-language-server
        type: pipx

      - name: black
        type: pipx

  # ----------------------------------------------------------------------
  # 🔌 Zsh & Tmux Plugins
  # ----------------------------------------------------------------------
  # Git-based plugins and themes for Zsh shell and Tmux.

  # - category: 🔌 Zsh & Tmux Plugins
  #   desc: Git-based plugins and themes for Zsh shell and Tmux.

  # local-plugins: no longer needed — tracked in-place by bare repo at ~/.local/share/zsh/plugins/local/

  - name: mfaerevaag/wd
    type: git
    tags: plugin zsh
