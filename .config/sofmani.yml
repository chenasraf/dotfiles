  - name: cospend-cli
    type: group
    steps:
      - name: cospend-cli
        bin_name: cospend
        type: brew
        opts:
          tap: chenasraf/tap
      - name: cospend-cli
        bin_name: cospend
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: chenasraf/cospend-cli
          destination: ~/.local/bin
          strategy: tar
          download_filename: cospend-cli-linux-{{ .Arch }}.tar.gz
          archive_bin_name: cospend-cli

  - name: direnv-dotenvx
    type: group
    steps:
      - name: direnv-dotenvx
        check_installed: test -f ~/.config/direnv/lib/use_dotenvx.sh
        type: brew
        post_install: test -f  ~/.config/direnv/lib/use_dotenvx.sh || ln -s $(brew --prefix)/opt/direnv-dotenvx/libexec/use_dotenvx.sh ~/.config/direnv/lib/use_dotenvx.sh
        post_update: test -f  ~/.config/direnv/lib/use_dotenvx.sh || ln -s $(brew --prefix)/opt/direnv-dotenvx/libexec/use_dotenvx.sh ~/.config/direnv/lib/use_dotenvx.sh
        opts:
          tap: chenasraf/tap
      - name: chenasraf/direnv-dotenvx
        enabled: false
        type: git
        check_installed: test -f ~/.config/direnv/lib/use_dotenvx.sh
        platforms:
          only: ["linux"]
        post_install: test -f  ~/.config/direnv/lib/use_dotenvx.sh || ln -s $(brew --prefix)/opt/direnv-dotenvx/libexec/use_dotenvx.sh ~/.config/direnv/lib/use_dotenvx.sh
        post_update: test -f  ~/.config/direnv/lib/use_dotenvx.sh || ln -s $(brew --prefix)/opt/direnv-dotenvx/libexec/use_dotenvx.sh ~/.config/direnv/lib/use_dotenvx.sh
        opts:
          destination: ~/.local/bin

  # ----------------------------------------------------------------------
  # 🛠️ Dev Tools & Utilities
  # ----------------------------------------------------------------------
  # CLI utilities and general tools for development workflows.

  # - category: 🛠️ Dev Tools & Utilities
  #   desc: CLI utilities and general tools for development workflows.

  - name: neovim
    bin_name: nvim
    type: group
    steps:
      - name: neovim
        bin_name: nvim
        type: brew
        platforms:
          only: ["macos"]

      - name: nvim
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: neovim/neovim
          strategy: tar
          download_filename: nvim-linux-{{ .ArchAlias }}.tar.gz
          extract_to: ~/.local/share/neovim
          strip_components: 1
          bin_links:
            - source: bin/nvim
              target: ~/.local/bin/nvim

  - name: tree-sitter
    type: github-release
    opts:
      repository: tree-sitter/tree-sitter
      destination: ~/.local/bin
      strategy: gz
      # tree-sitter release arch naming: arm64 | x64 (not amd64/x86_64)
      download_filename: tree-sitter-{{ .OS }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}.gz

  - name: lazygit
    type: group
    steps:
      - name: lazygit
        type: brew
      - name: lazygit
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: jesseduffield/lazygit
          strategy: tar
          destination: ~/.local/bin
          # destination: /usr/local/bin
          download_filename: lazygit_{{ .Version }}_Linux_{{ .ArchAlias }}.tar.gz

  - name: lazydocker
    type: group
    steps:
      - name: lazydocker
        type: brew
        opts:
          tap: jesseduffield/lazydocker
      - name: lazydocker
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: jesseduffield/lazydocker
          strategy: tar
          destination: ~/.local/bin
          # destination: /usr/local/bin
          download_filename: lazydocker_{{ .Version }}_Linux_{{ .ArchAlias }}.tar.gz

  - name: lazysql
    type: group
    steps:
      - name: lazysql
        type: brew
        opts:
          tap: jorgerojas26/lazysql
      - name: lazysql
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: jorgerojas26/lazysql
          strategy: tar
          destination: ~/.local/bin
          # destination: /usr/local/bin
          download_filename: lazysql_Linux_{{ .ArchAlias }}.tar.gz

  - name: lazyssh
    type: group
    steps:
      - name: lazyssh
        type: brew
        opts:
          tap: Adembc/tap
      - name: lazyssh
        type: github-release
        platforms:
          only: ["linux"]
        opts:
          repository: Adembc/lazyssh
          strategy: tar
          destination: ~/.local/bin
          # destination: /usr/local/bin
          download_filename: lazyssh_Linux_{{ .ArchAlias }}.tar.gz

  - name: atuin
    type: shell
    check_has_update: '[ "$(cat ~/.cache/sofmani/atuin-version.txt 2>/dev/null)" != "$(curl -fsSL https://api.github.com/repos/atuinsh/atuin/releases/latest | jq -r .tag_name)" ]'
    post_install: mkdir -p ~/.cache/sofmani && curl -fsSL https://api.github.com/repos/atuinsh/atuin/releases/latest | jq -r .tag_name > ~/.cache/sofmani/atuin-version.txt
    post_update: mkdir -p ~/.cache/sofmani && curl -fsSL https://api.github.com/repos/atuinsh/atuin/releases/latest | jq -r .tag_name > ~/.cache/sofmani/atuin-version.txt
    opts:
      command: curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh
      update_command: atuin-update

  - name: delta
    type: group
    steps:
      - name: delta
        type: shell
        platforms:
          only: ["linux"]
        opts:
          command: |
            curl https://github.com/dandavison/delta/releases/download/0.17.0/git-delta_0.17.0_amd64.deb | dpkg -i
      - name: git-delta
        type: brew
        bin_name: delta

  - name: jq
    type: group
    steps:
      - name: jq
        type: brew
      - name: jq
        type: apt
        platforms:
          only: ["linux"]

  - name: yq
