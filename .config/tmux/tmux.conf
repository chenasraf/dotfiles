set-environment -g TMUX_PLUGINS_DIR "$HOME/.tmux/plugins"
# Enable full colors
set-option -sa terminal-overrides ",xterm*:Tc"

# Let apps (e.g. Ghostty shell integration OSC 133, OSC 9;4 progress) reach the outer terminal
set -g allow-passthrough on

# remap prefix from 'C-b' to 'C-space'
# unbind C-b
# set-option -g prefix C-space
# bind-key C-space send-prefix
set -g escape-time 0

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind j run-shell '~/.config/tmux/popuptmux'
bind m run-shell 'tmux setenv -g MOVE_PANE_SESSION "#{session_name}" \; setenv -g MOVE_PANE_WINDOW "#{window_index}" \; setenv -g MOVE_PANE_ID "#{pane_id}" \; popup -E ~/.config/tmux/move-pane'
unbind '"'
unbind %

# default session sorting
set -g @tree-mode-default-sort 'time'

# sort sessions by name in selector (prefix → s → n)
# sort by recently used (prefix → s → r)
bind S switch-client -T session-sort
bind -T session-sort n choose-tree -sZ -O name
bind -T session-sort r choose-tree -sZ -O time

# switch panes using Ctrl-Alt-arrow without prefix
# bind -n C-M-Left select-pane -L
# bind -n C-M-Right select-pane -R
# bind -n C-M-Up select-pane -U
# bind -n C-M-Down select-pane -D

# Set base index 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Set VI mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Ctrl+Shift+W to close session
bind -n C-M-w confirm-before kill-session

# Clear screen and scrollback
bind L clear-history \; send-keys C-l

# Toggle between the two most recently used sessions
bind T switch-client -l

# Enable mouse control
set -g mouse on

# Enable focus events to allow tmux to detect when it is focused or unfocused
set -g focus-events on

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'tmux-plugins/tmux-online-status'
# set -g @plugin 'tmux-plugins/tmux-battery'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Load local config if exists
if-shell "[[ -f ~/.config/tmux/local.tmux ]]" {
  source -F "#{d:current_file}/local.tmux"
}

source -F "#{d:current_file}/theme.tmux"
source -F "#{d:current_file}/modules/vim-tmux-navigator.tmux"

# NOTE Initialize TMUX plugin manager (keep this line at the very bottom of tmux conf)
# run '${TMUX_PLUGINS_DIR}/tpm/tpm'
run 'tpack init'
